version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: checkboxes-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkboxes-server
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=8000
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: npm start

volumes:
  redis_data:
