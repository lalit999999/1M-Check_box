<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1M check_box</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1e1e2e 0%, #2a2a3e 100%);
      color: #e0e0e0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 40px;
      background: linear-gradient(135deg, #6366f1 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
    }

    #container {
      max-width: 800px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 15px;
      padding: 30px;
      background: rgba(42, 42, 62, 0.8);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(99, 102, 241, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    input[type="checkbox"] {
      width: 24px;
      height: 24px;
      cursor: pointer;
      accent-color: #6366f1;
      transition: all 0.3s ease;
    }

    input[type="checkbox"]:hover {
      transform: scale(1.2);
      accent-color: #a78bfa;
    }

    input[type="checkbox"]:checked {
      accent-color: #4f46e5;
    }
  </style>
  <!-- enable dark mode in this page -->
  <body>
    <h1>Check Boxes</h1>
    <div id="container"></div>
    <script src="/socket.io/socket.io.js"></script>

    <script>
      const container = document.getElementById("container");
      const checkboxe_count = 100;
      const checkboxElements = [];

      // Initialize Socket IO connection
      const socket = io();

      // Create checkboxes
      new Array(checkboxe_count).fill(0).forEach((_, index) => {
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = `checkbox-${index}`;
        container.appendChild(checkbox);
        checkboxElements[index] = checkbox;

        // Send checkbox change to server
        checkbox.addEventListener("change", (event) => {
          const isChecked = event.target.checked;
          console.log(`Checkbox ${index} changed: ${isChecked}`);

          // Emit to server
          socket.emit("client:checkbox:change", {
            index: index,
            checked: isChecked,
          });
        });
      });

      // Receive initial state from server
      socket.on("server:checkbox:initial", (checkboxes) => {
        console.log("Received initial checkbox state");
        checkboxes.forEach((isChecked, index) => {
          checkboxElements[index].checked = isChecked;
        });
      });

      // Receive real-time updates from server
      socket.on("server:checkbox:change", (data) => {
        console.log(`[Server]:checkbox:change`, data);
        checkboxElements[data.index].checked = data.checked;
      });

      // Handle socket events
      socket.on("connect", () => {
        console.log("Connected to server", socket.id);
      });

      socket.on("disconnect", () => {
        console.log("Disconnected from server");
      });
    </script>
  </body>
</html>
