<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>1M check_box</title>
  </head>
  <body>
    <h1>Check Boxes</h1>
    <div id="container"></div>
    <script src="/socket.io/socket.io.js"></script>
    
    <script>
      const socket = io();
      const container = document.getElementById("container");
      const checkboxe_count = 100;


      socket.on('server:checkbox:update', (data) => {
        console.log(`Received checkbox update from server:`, data);
        const checkbox = document.getElementById(`checkbox-${data.index}`);
        if (checkbox) {
          checkbox.checked = data.checked;
        }
      });

      new Array(checkboxe_count).fill(0).forEach((_, index) => {
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = `checkbox-${index}`;
        container.appendChild(checkbox);

        checkbox.addEventListener("change", (event) => {
          const isChecked = event.target.checked;
          console.log(`Checkbox ${index} is now ${isChecked ? "checked" : "unchecked"}`);
          socket.emit('client:checkbox:change', { index, checked: isChecked });
        });
      });
    </script>
  </body>
</html>
